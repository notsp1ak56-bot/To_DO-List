{% extends 'tasks/base.html' %}

{% block title %}Заявка на смену пароля{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-warning">
                <h4><i class="fas fa-shield-alt"></i> Заявка на смену пароля</h4>
            </div>
            <div class="card-body">
                <p class="text-muted">Ваша заявка будет рассмотрена администратором. После одобрения вы сможете войти с новым паролем.</p>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-warning w-100">Отправить заявку</button>
                </form>
                <hr>
                <p class="text-center"><a href="{% url 'profile' %}">Вернуться в профиль</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
