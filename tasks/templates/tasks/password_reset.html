{% extends 'tasks/base.html' %}

{% block title %}Восстановление пароля{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4><i class="fas fa-key"></i> Восстановление пароля</h4>
            </div>
            <div class="card-body">
                <p class="text-muted">Введите ваш email, мы отправим инструкцию для сброса пароля</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Отправить</button>
                </form>
                <hr>
                <p class="text-center"><a href="{% url 'login' %}">Вернуться ко входу</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
